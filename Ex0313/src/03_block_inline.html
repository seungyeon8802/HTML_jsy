<!DOCTYPE html>
<html lang="ko">

    <head>
        <title>블록요소와 인라인요소</title>
        <!-- 블록요소(줄이바뀜)와 인라인요소(줄이 안바뀜) -->
    </head>

    <body>
        안녕하세요
        <p>단락을 정의하는 <b>p태그는</b> 
            <strong>블록</strong></p>

        <p>
            <!-- <br> : 강제개행  -->
            <i>첫번째 줄</i> <br>  <!-- 단순 디자인용 요소 -->
            <em>두번째 줄</em> <br>  <!-- 해당 문장이 중요해서 강조하고 싶을 때 -->
            세번째 줄
        </p>
        
        <hr/> <!-- 수평선(단락구분) :(블록요소) -->


        <p>
            <a href="01_init.html" target="_blank">링크를 연결하는 a태그</a>
            <a href="https//www.naver.com">네이버</a>
            <a href="#">인라인 요소인 a태그</a>  <!-- "#" 은 임시링크-->
        </p>

    </body>

</html>
