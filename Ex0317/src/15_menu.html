<!DOCTYPE html>
<html lang="ko">
    <head>
	<style>
        *{margin: 0; padding: 0;} 
        li{ list-style: none; }
        
        #menu{ background: #333;
                overflow: hidden; } /* 자식(li)의 float을 인식하여 높이값 유지 */
        #menu > li{ float:left; } /* 메뉴 항목들을 왼쪽부터 가로로 나열 */
        #menu li a{ padding: 10px; /* 상하좌우 여백으로 클릭 영역 확보 */
                    color:#fff;
                    text-decoration: none;  /* 밑줄 제거 */
                    display: block; }  /* 영역 전체를 클릭 가능하게 '블록화' */
        #menu > li > a:hover{ background: #555; } /* 주메뉴 마우스 올리면 배경 약간 밝게 */
        ul.submenu li a:hover{ 
                    background: #aaf; } /* 서브메뉴 마우스 올리면 연보라색 */
        ul.submenu{ position: absolute;  /* 공중에 띄워 메인 메뉴 위에 겹치게 배치 */
                    background: #333; 
                    display: none; } /* 기본 상태에서는 화면에서 숨김 */
                       
        #menu li:hover ul.submenu{ display: block; } /* 부모(li)에 마우스 올리면 서브메뉴(ul) 보여줌 */
	</style>
    </head>
    <body>
        <ul id="menu">
            <li><a href="#">주메뉴1</a>
                <ul class="submenu">
                    <li><a href="#">하위메뉴1-1</a></li>
                    <li><a href="#">하위메뉴1-2</a></li>
                </ul>
            </li>

            <li><a href="#">주메뉴2</a>
                <ul class="submenu">
                    <li><a href="#">하위메뉴2-1</a></li>
                    <li><a href="#">하위메뉴2-2</a></li>
                    <li><a href="#">하위메뉴2-3</a></li>
                </ul>

            </li>
                
            <li><a href="#">주메뉴3</a>
                <ul class="submenu">
                    <li><a href="#">하위메뉴3-1</a></li>
                    <li><a href="#">하위메뉴3-2</a></li>
                    <li><a href="#">하위메뉴3-3</a></li>
                </ul>
            </li>
        </ul>

    </body>
</html>
