<!DOCTYPE html>
<html lang="ko">
    <head>
	<style>
        
        *{margin:0; padding: 0;}

        #header{ margin:10px auto;
                width:500px; 
                border:5px solid #caa;
                background: #fdd;
                overflow: hidden;} /*자식들(c1,c2)이 float을 가지고 있으면 부모(header)가 overflow를 가지고 있다(세트로생각하기)*/
                 /*c1,c2가 float 형태이면, 부모header가 자식의 높이를 인식하도록 folat해제가 필요
        overflow:hidden으로 float을 해제한다.*/
        h1{ text-align: center;}
        .c1{width:200px;
            padding:15px;
            background: #dda;
            float:left; }
        .c2{width:200px;
            padding:15px;
            background: #ba7;
            float: right;}

	</style>
    </head>
    <body>
        <div id="header">
            <h1>float연습</h1>

            <div class="c1">내용 left</div>

            <div class="c2">내용 right</div>

        </div>
    </body>
</html>
