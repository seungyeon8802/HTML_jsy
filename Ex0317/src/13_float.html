<!DOCTYPE html>
<html lang="ko">
    <head>
	<style>
        *{margin:0; padding: 0;}

        #wrap{ width:650px;                 
               margin:0 auto;
                background: black;
                border:5px solid #f00; }

        #header{ background: #09f;
                 margin-bottom: 10px;
                 padding: 10px 0;  
                 color:#fff;
                 text-align: center; }
        #footer{ background: #33f;
                text-align: center;
                padding: 10px 0;
                color: #fff; }
        #body{ overflow: hidden;
                background: #ccc;
                margin-bottom: 10px;}
        #left{ float:left;
                width:180px;
                height: 350px;
                background: #fcf;
                padding: 10px;}
        #center{ float:left;
                width:180px;
                height: 350px;
                background: #aaf;
                padding: 10px;
                margin: 0 25px;}
        #right{ float:right;
                width:180px;
                height: 350px;
                background: #fff;
                padding: 10px;}


	</style>
    </head>
    <body>
        <div id="wrap">

            <div id="header">우리의 자랑 스포츠의 꽃</div>

            <div id="body">
                <div id="left">왼쪽샬라샬라</div>
                <div id="center">가운데</div>
                <div id="right">오른쪽</div>
                
            </div>

            <div id="footer">
                    나는 Footer</div>

        </div>
        
    </body>
</html>
