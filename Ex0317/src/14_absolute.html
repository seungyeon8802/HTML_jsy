<!DOCTYPE html>
<html lang="ko">
    <head>
        <!-- position:absolute -> 요소를 공중 부양시켜서 '원하는 위치'에 정확히 배치함
             position: relative; ->  내 box안에서만 이동가능함? --> 
	<style>
        *{margin:0; padding:0;} 
        .box{ width:250px;
            border:1px solid red; 
            margin:70px;
            position: relative; }
        p{ width:130px;
            height: 80px;
            padding: 10px;
            color:#fff;}
        .red{ background: red;}
        /* .blue에 left, top속성을 추가하니, .box를 부모로 인지하지 못하고 영역 밖으로 벗어나게 됐다
           .blue의 부모인 .box가 position:relative; 속성을 통해서 여전히 .blue의 부모임을 명시할 수 있다. */
        .blue{ background: blue;
                position: absolute; /*blue가 공중으로 띄운 상태. 그래서 밑에있는 green이 위로 올라온 형태(blue자리에)*/
                left:50px; 
                top:30px; } 
                .green{ background: green;}

	</style>
    </head>
    <body>
        <div class="box">
            <p class="red">position 1</p>
            <p class="blue">position 2</p>
            <p class="green">position 3</p>
        </div>
    </body>
</html>
