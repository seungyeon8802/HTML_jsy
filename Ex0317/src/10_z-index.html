<!DOCTYPE html>
<html lang="ko">
    <head>
	<style>
        *{margin: 0; padding: 0;}
        p{border: 1px solid black;
            width:100px;
            padding: 40px 0;
            text-align: center;
            position: absolute;} /*절대위치*/
            /* z-index: 겹쳐져 있는 요소들의 순서를 변경하는 속성
                z-index값이 클 수록 위에 표시된다*/
        .box1{ background: yellow;
                left:100px; top:100px; /*왼쪽으로부터 100px만큼 떨어진, 위에서부터 100px만큼 떨어진*/
                z-index:3;} /*겹치면 맨 위로 올라오게*/
        .box2{ background: orange;
                left:120px; top:120px;
                z-index:2}
        .box3{ background: teal;
                left:140px; top:140px;}
	</style>
    </head>
    <body>
        <p class="box1">박스1</p>
        <p class="box2">박스2</p>
        <p class="box3">박스3</p>
    </body>
</html>
