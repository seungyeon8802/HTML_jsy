<!DOCTYPE html>
<html lang="ko">
    <head>
        <title>인라인요소 -> 블록요소(세로정렬)</title>
        <style>
            li{ list-style:none; }
            span{ display:block;} /* 인라인요소를 블록요소로 바꿔줌 */
        </style>
    </head>
    <body>
        <ul>
            <li>
                <img src="resources/image/acid2Test.jpg" alt="웃는 얼굴" />
                <span>이미지1</span>
                <span>내용1</span>
            </li>
            <li>
                <img src="resources/image/acid2Test.jpg" alt="웃는 얼굴" />
                <span>이미지2</span>
                <span>내용2</span>
            </li>
        </ul>
    </body>
</html>
