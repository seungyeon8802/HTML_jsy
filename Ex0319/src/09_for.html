<html lang="ko">
    <head>
        <script>
            let dan = Number(prompt("출력할 구구단 숫자를 입력하세요:"));
    
            for (let i = 1; i <= 9; i++) {
            document.write(dan + " x " + i + " = " + (dan * i) + "<br/>");

            }
            document.write('<hr/>')

            document.write('<ul>')
            for (let i = 1; i <= 5; i++ ){
                document.write( '<li>메뉴' + i + '</li>' );
            }    
            document.write('</ul>')

        </script>
