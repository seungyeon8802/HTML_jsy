<!DOCTYPE html>
<html lang="ko">
    <head>
        <script>
            /*
                프롬프트를 통해서 국,영,수 점수를 받는다.
                세 과목의 총점과 평균을(소수점 2자리까지)출력
            */
            let ko = Number(prompt(" 국어 점수 : "));
            let ma = Number(prompt(" 수학 점수 : "));
            let en = Number(prompt(" 영어 점수 : "));
            let total = ko + ma + en;       
            let avg = total / 3;

            document.write( "총점 : " + total + '점<br/>');
            document.write( "평균 :" + avg.toFixed(2) );


        </script>
    </head>
    <body>
        
    </body>
</html>
