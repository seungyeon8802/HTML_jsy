<!DOCTYPE html>
<html lang="ko">
    <head>
        <script>
            let a = 10;  //담고
            let b = 3;
            let result = a + b;
            document.write( result + "<br/>" );  //출력

            result = a / b;
            document.write( result.toFixed(2) + "<br/>");   //.toFixed() 소수점 자리 끊어냄

            let num1 = 10;    // 숫자 10 
            let num2 = "10";  //문자열 10
            result = num1 == num2; //  자료형까지 같아야 하는지 할거면 ===  3개 
            // == : 타입 구별 없이 값이 같다고 판단되는 참 ( 값만 같을 때 )
            // === : 타입까지 구별해서 값이 같아야 참( 같도 같아야 하고, 자료형까지 같아야 해 !)
            document.write( result, '<br/>')    //자바스크립트는 맨 뒤 ;(세미클론) 안 넣어도 동작하긴 함. 근데 넣어라~^^
        </script>
    </head>
    <body>
        
    </body>
</html>
