<!DOCTYPE html>
<html lang="ko">
    <head>
        <style>

            *{ margin:0;  /*margin값 아예 안넣음*/
               padding:0;} /*padding값 아예 안넣음*/

            dl{ width:650px; 
                border:5px double gray;  /*double : 이중실선*/
                margin:0 auto;}  /* 가운데 정렬 ((매우중요))*/
            dt{ padding:15px 0; /*위아래 15px, 양옆은 0px*/
                text-align:center;
                background-color: #aaf;
                border-bottom: 10px solid blue;
                letter-spacing: 10px;} /*글자 사이의 간격 확보*/
            dd{ padding:10px 0px; 
                background-color: yellow;
                text-indent: 15px;}
            .line{ border-bottom: 5px dotted black;}

        </style>
    </head>

    <body>

        <dl>
            <dt>dl디자인 연습</dt>
            <dd class="line">스타일 시트를 연습하자</dd>
            <dd>영차 영차</dd>
        </dl>

    </body>
</html>
