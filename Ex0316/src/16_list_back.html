<!DOCTYPE html>
<html lang="ko">
    <head>
        <style>
            /* list-style: 가장 많이 쓰임 
               list-style로 사용했을 때 옆에 점을 어떻게 할 건지 지정*/
            .m1{ list-style: none;} /*점 빼버리기*/
            .m2{ list-style: disc;}   /*기본 스타일*/
            .m3{ list-style: circle;} /*하얀색 동그라미*/
            .m4{ list-style: square;} /*네모난 점*/
            .m5{ list-style: upper-alpha;} /* 대문자 알파벳으로 순번 매김*/
            .m6{ list-style: lower-alpha;} /* 소문자 알파벳으로 순번 매김*/
            .m7{ list-style: upper-roman;} /* 대문자 로마자로 순번 매김*/
            .m8{ list-style: lower-roman;} /* 소문자 로마자로 순번 매김*/
        </style>
    </head>
    <body>
        <ul>
            <li class="m1">메뉴1</li>
            <li class="m2">메뉴2</li>
            <li class="m3">메뉴3</li>
            <li class="m4">메뉴4</li>
            <li class="m5">메뉴5</li>
            <li class="m6">메뉴6</li>
            <li class="m7">메뉴7</li>
            <li class="m8">메뉴8</li>
        </ul>
    </body>
</html>
