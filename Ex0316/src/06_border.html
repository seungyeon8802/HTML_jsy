<!DOCTYPE html>
<html lang="ko">
    <head>
        <style>
            p{ border-width:20px;
               border-color:blue; }

            .box1{ border-style:none;} /* 눈에 안보이는 속성들 */
            .box2{ border-style:hidden;} /* 눈에 안보이는 속성들 */

            .box3{ border-style:dotted;} /* 점 형태*/
            .box4{ border-style:dashed;} /* 점선 테두리*/
            .box5{ border-style:solid;} /* 실선 테두리 ""가장 많이 쓰임""*/
            .box6{ border-style:double;} /* 2중테두리*/
            .box7{ border-style:groove;} /*명암을 가지고 있는 테두리*/
            .box8{ border-style:ridge;} /* groove와 반대 테두리 (명암주는차이?)*/
            .box9{ border-style:inset;} /*두께 x 명암 o*/
            .box10{ border-style:outset;} /* insrt랑 반대 */

            .div1{ border: 10px solid blue;  /*width, solid, color 줄여서 씀 순서는 중요x*/
                   width:200px;
                   height:100px; }
            .div2{ border-bottom:10px solid #f00; } /*나 아래쪽에만 라인 그릴거에여*/
            .div3{ border-width:10px 20px 30px 40px; /*시계방향으로 속성적용, 이 형식 그대로 사용(단축x -ex. border:10px~)*/
                   border-style:solid;
                   border-color:blue;}
            /* 상우하좌등 여러방향에 각각 속성을 적용하려면  width, style등의 속성값에 border~를 꼭 넣어줘야 한다. */
        </style>
    </head>
    <body>
        <p class="box1">box테두리 연습1</p>
        <p class="box2">box테두리 연습2</p>
        
        <p class="box3">box테두리 연습3</p>
        <p class="box4">box테두리 연습4</p>
        <p class="box5">box테두리 연습5</p>
        <p class="box6">box테두리 연습6</p>
        <p class="box7">box테두리 연습7</p>
        <p class="box8">box테두리 연습8</p>
        <p class="box9">box테두리 연습9</p>
        <p class="box10">box테두리 연습10</p> 

        <div class="div1">div의 테두리1</div>
        <div class="div2">div의 테두리2</div>
        <div class="div3">div의 테두리3</div>
    </body>
</html>
