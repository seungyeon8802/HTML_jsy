<!DOCTYPE html>
<html lang="ko">
    <head>
        <style>
            .back1{ border:1px solid black;
                    padding:70px;
                    /* height:150pxl 왼쪽 구석으로 감 */
                    background: yellow url(resources/image/background.jpg) no-repeat right bottom;}
                    /* 배경색과 이미지도 같이 넣는 것 가능, 
                     ***** 위치 속성(right, bottom)은 최대 2개까지 사용가능!! */
            .back2{ border:1px solid black;
                    width:500px;
                    height:300px; 
                    background: url(resources/image/acid2Test.jpg) no-repeat 170px 50px;} /*왼오,위아래*/
                    /* 기본값: 무조건 왼쪽 상단
                    기본값은 왼쪽 위 절대좌표값으로도 위치지정이 가능함 */
            .back3{ border:1px solid black;
                    width:500px; height:300px;
                    background: url(resources/image/background.jpg ) no-repeat center;} /* no-repeat 다음에 center지정시 '정 가운데'로 감*/
            .back4{ border:1px solid black;
                    width:500px; height: 300px; 
                    background: url( resources/image/background.jpg) no-repeat 70% 10%;}
                    /* 비율을 통해서 위치값 설정 가능 %를 사용한다.  */
        </style>
    </head>
    <body>
        <p class="back1"></p>
        <p class="back2"></p>
        <p class="back3"></p>
        <p class="back4"></p>
    </body>
</html>
