<!DOCTYPE html>
<!-- transition: 간단한 애니메이션 -->
<html lang="ko">

<head>
    <style>
        .ex {
            width: 100px;
            height: 100px;
            background: red;
            /* 기본 속성이더라도 꼭 기재해줘야함!! */
            border-radius: 0px; /*radius : 0px 그냥 네모로 그릴게요 */
            
            transition-property: background, border-radius;
            transition-duration: 2s; /*2초동안 변경, 2초에 걸쳐서 나타남 */
            transition-delay: 2s; /*2초 후 시작*/

            /* -webkit- :  크롬, 사파리에서 적용 */
            -webkit-transition-property: background, border-radius;
            -webkit-transition-duration: 2s; /*2초 동안 변경*/
            -webkit-transition-delay: 2s;
            /* -moz- : 파이어폭스에서 인식 못할 때 적용 */
            -moz-transition-property: background, border-radius;
            -moz-transition-duration: 2s; /*2초 동안 변경*/
            -moz-transition-delay: 2s;

            /* 호환성 문제 때문에 사용함 
            -webkit- : 크롬, 사파리
            -moz- : 파이어폭스
            -o- : 오페라 브라우저
            -ms- : 익스플로러 
            */
        }
        
        .ex:hover{
            background: blue;
            border-radius: 50px;    
        }
    </style>
</head>

<body>
    <p>도형 위로 마우스를 올려보세요</p>
    <div class="ex"></div>
</body>


</html>
