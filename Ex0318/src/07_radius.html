<!DOCTYPE html>
<!-- radius : 외곽선(모서리)을 둥글게 만들어 주는 스타일 -->
<html lang="ko">

<head>

    <style>
        h1 {
            width: 200px;
            padding: 80px 0;
            background: #aaf;
            text-align: center;
            border-radius: 20px 30px 40px 50px;
            /* border-radius : 최대 4개까지 속성 담을 수 있음 */
            /* border-radius : 20xp; -> 네귀퉁이 모두 적용
               border-radius : 20xp 30px;-> 좌상 우하, 우상 좌하 순으로 적용
               border-radius : 20xp 30px 40px;-> 좌상, 우상 좌하, 우하 순으로 적용
               border-radius : 20xp 30px 40px 50px;-> 왼쪽 위부터 시계방향순((좌상, 우상, 우하, 좌하)으로 적용
             */
        }
    </style>
</head>

<body>
    <h1>내용</h1>
</body>

</html>
