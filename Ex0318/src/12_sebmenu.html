<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="stylesheet" href="css/reset.css" />

    <style>
        #nav {
            width: 1000px;
            height: 45px;
            padding: 6px 7px;
            background: #666;
            margin: 0 auto;
        }

        /* 직계자식들이 전체적으로 중앙으로 들어갈 수 있게 세팅 */
        #nav > li:first-child{margin-left: 200px;}

        /* (직계li)직계자식들에게만 속성 줌 */
        #nav > li {
            float: left;
            position: relative;
            margin: 3px 10px;
            margin-left: 80px;
            margin-top: 5px;
        }

        /* li안의 모든태그 */
        #nav li a {
            display: block;
            font: bold 16px "고딕", sans-serif;
            color: #e7e5e5;
            padding: 5px;
        }

        #nav li:hover a {
            background: #fff;
            color: #444
        }

        #nav ul {
            position: absolute;
            left: 0;
            top: 34px;
            width: 150px;
            border: 1px solid #b4b4b4;
            display: none;
        }

        #nav li:hover ul {
            display: block;
        }

        #nav ul a {
            color: #333;
        }

        #nav ul li:hover a{
            background: #ccc;
            color: #fff;
        }
    </style>
</head>

<body>
    <ul id="nav">
        <li><a href="#">처음으로</a></li>

        <li>
            <a href="#">여행안내</a>
            <ul>
                <li><a href="#">소개합니다</a></li>
                <li><a href="#">오시는 길</a></li>
            </ul>
        </li>

        <li>
            <a href="#">이용방법</a>
            <ul>
                <li><a href="#">객실 둘러보기</a></li>
                <li><a href="#">요금 안내</a></li>
                <li><a href="#">예약하기</a></li>
                <li><a href="#">예약안내</a></li>
            </ul>
        </li>

        <li>
            <a href="#">게시판</a>
            <ul>
                <li><a href="#">공지사항</a></li>
                <li><a href="#">Q&A</a></li>
            </ul>
        </li>

        <li><a href="#">내정보</a></li>

    </ul>

    <!-- //ㅓㅏㅗㄴ타ㅣㄴㅁ엄나ㅓㅣㄴ//ㅇ -->
</body>

</html>
