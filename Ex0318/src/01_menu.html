<!DOCTYPE html>
<html lang="ko">
    <head>
        <link rel="stylesheet" href="css/reset.css"/>
	<style>
        .container{ position: relative;
                    width:280px;
                    margin: 30px auto;}
        .menu{ background: #333;
                padding: 20px;
                }
        .menu ul li{  display: inline; 
                      position: relative;
                      margin-right: 20px; }
        .menu ul li a{ color:#fff;
                        font-weight: bold;}
        .submenu{ position: absolute;
                    left:0;/*왼쪽으로 완전히 붙여서*/
                    width:100px;
                    background: #444;
                    display: none;
                     }
        .menu ul li:hover .submenu{ display: block; }
        .submenu li a{ padding: 10px;
                        display: block; } 
        .submenu li a:hover{ background: #555; }
        .menu ul li:first-child{ margin-left: 14px; }
        
        


	</style>
    </head>
    <body>
        <div class="container">
            <div class="menu">
                <ul>
                    <li><a href="#">홈</a></li>

                    <li>
                        <a href="#">서비스</a>
                            <ul class="submenu">
                                <li><a href="#">웹개발</a></li>
                                <li><a href="#">앱개발</a></li>
                                <li><a href="#">디자인</a></li>
                            </ul>
                    </li>

                    <li><a href="#">소개</a></li>
                    <li><a href="#">연락처</a></li>
                </ul>
            </div>
        </div>




    </body>
</html>
