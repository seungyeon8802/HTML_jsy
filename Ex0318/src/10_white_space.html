<!DOCTYPE html>
<html lang="ko">

<head>
    <style>
        .normal {
            white-space: normal;
        }
        /* 줄바꿈을 지정해줄 때 줄바꿈을 없애고 옆으로 스크롤바를 만들어서 넘김(잘 안씀) */
        .nowrap {
            white-space: nowrap;
        }
        /* .pre 제일 많이 쓰임 
        html의 규격을 무시하고 작성한 그대로를 출력(style시트 보다 pre태그 이용하는게 용이)*/
        .pre{white-space: pre;}
    </style>
</head>

<body>
    <p class="normal">
        공백문자의 처리를 위해 white-space를 사용한다
    </p>

    <p class="nowrap">
        자동 줄바꿈이 아닐때 nowrap을 통해서 한줄로 출력할 수 있다.
        만일 웹 브라우저를 넘어가는 너비라면 자동으로 스크롤을 생성해준다.
    </p>

    <p class="pre">
        for( int i = 0; i < 10; i++ ){ System.out.println( i ); } </p>

    <p>
        <pre>
             for( int i = 0; i < 10; i++ ){ System.out.println( i ); }
        </pre>
    </p>

</body>

</html>
