<!DOCTYPE html>
<html lang="ko">
    <head>
<link rel="stylesheet" href="css/reset.css"/>
	<style>
        table{ border:1px solid gray; 
                width:900px; 
                background: #ffc;
                margin:0 auto; }
        caption{ font-size: 20px;
                font-weight: bold; 
                margin-bottom: 10px;}
        thead th{ background: #36f;
                color:#fff; 
                padding: 5px 0;}
        th{ background: blue;
                padding: 15px;

        .aa{ padding:30px 0;

        tbody td:nth-child(2),

	</style>
